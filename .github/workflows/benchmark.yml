name: benchmark

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # backstop; the per-case time budget keeps the sweep well under this
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run:
        uv sync --locked --group dev
    - name: Name the artifact after the branch
      if: always()
      run: echo "slug=${REF//\//-}" >> "$GITHUB_OUTPUT"
      id: branch
      env:
        REF: ${{ github.head_ref || github.ref_name }}
    - name: Run composition benchmark
      # Each case sweeps until it hits the per-case time budget (see
      # test_composition.py); raise BENCH_BUDGET_SECONDS to sweep the heavy tail
      # further on dedicated hardware.
      run: |
        mkdir -p benchmark-results
        uv run pytest benchmark/ -v --benchmark-json=benchmark-results/bench.json
    - name: Render report (and gate on the committed baseline, if present)
      if: always()
      run:
        uv run python benchmark/report.py benchmark-results/bench.json
          --output benchmark-results
          --baseline benchmark/baseline.json
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ steps.branch.outputs.slug }}
        path: benchmark-results/
