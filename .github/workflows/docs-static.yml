name: docs-static

# Regenerate the documentation images in docs/_static and commit them back to
# the pull request. Rather than trusting the author to commit the images
# produced by the doctests, CI reruns the doctests on every pull request and,
# whenever an image actually changed, commits the result back onto the branch.
#
# The push uses a GitHub App installation token (minted below) rather than the
# default GITHUB_TOKEN. A commit pushed with GITHUB_TOKEN does not start any
# workflow run, which would leave the regenerated head commit without the
# required `build` checks and thus block the merge. Pushing with the App token
# lets `build` run on the regenerated commit so the pull request can be merged.
#
# Configure the App by storing its id in the `DOCS_BOT_APP_ID` repository
# variable and its private key in the `DOCS_BOT_PRIVATE_KEY` secret. When the
# variable is unset the job falls back to GITHUB_TOKEN: it still regenerates and
# commits, but the resulting commit will not trigger `build` and so will need a
# CI re-run before merging.
#
# To avoid an endless commit loop, should the drawing ever fail to be
# pixel-reproducible across machines, the regeneration is skipped when the head
# commit is itself a regeneration commit: that second run only lets `build`
# validate it.

on:
  pull_request:

env:
  SRC_DIR: discopy
  DOCS_DIR: docs

jobs:
  docs-static:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - name: Generate a bot token
      id: app-token
      # Only mint an App token when the App is configured; otherwise the
      # checkout below falls back to GITHUB_TOKEN.
      if: vars.DOCS_BOT_APP_ID != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ vars.DOCS_BOT_APP_ID }}
        private-key: ${{ secrets.DOCS_BOT_PRIVATE_KEY }}
    - uses: actions/checkout@v4
      with:
        # Push regenerated images with a token that can trigger CI (see above),
        # falling back to the default token when the App is not configured.
        token: ${{ steps.app-token.outputs.token || github.token }}
        # Check out the pull request's head branch (not the merge commit) so
        # that we can push the regenerated images back onto it.
        ref: ${{ github.head_ref }}
        fetch-depth: 0
    - name: Skip if the head commit is already a regeneration
      id: guard
      run: |
        if git log -1 --pretty=%s | grep -q '^Regenerate docs/_static'; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Setup uv
      if: steps.guard.outputs.skip != 'true'
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      if: steps.guard.outputs.skip != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Graphviz
      if: steps.guard.outputs.skip != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz
    - name: Install
      if: steps.guard.outputs.skip != 'true'
      run:
        uv sync --locked --group dev --group all
    - name: Regenerate docs/_static
      if: steps.guard.outputs.skip != 'true'
      # Running the doctests redraws every image referenced with a
      # `.draw(path='docs/_static/...')` call into docs/_static.
      run:
        uv run pytest --doctest-modules ${{ env.SRC_DIR }}
    - name: Commit and push
      if: steps.guard.outputs.skip != 'true'
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add ${{ env.DOCS_DIR }}/_static
        if git diff --cached --quiet; then
          echo "No changes to docs/_static."
        else
          git commit -m "Regenerate docs/_static"
          git push origin HEAD:${{ github.head_ref }}
        fi
