name: benchmark

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run:
        uv sync --locked --group dev --group all
    - name: Name the artifact after the branch
      if: always()
      run: echo "slug=${REF//\//-}" >> "$GITHUB_OUTPUT"
      id: branch
      env:
        REF: ${{ github.head_ref || github.ref_name }}
    - name: Run composition benchmark
      run:
        uv run pytest benchmark/ -v
          --log-cli-level=INFO
          --log-cli-format="%(message)s"
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ steps.branch.outputs.slug }}
        path: benchmark-results/
