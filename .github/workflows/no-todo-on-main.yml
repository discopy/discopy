name: no-todo-on-main
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
jobs:
  guard:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block TODO files from the default branch
        run: |
          if git ls-files | grep -qiE '(^|/)todo(\.[^/]*)?(/|$)'; then
            echo "::error::A file or directory named TODO is present — a human must review it and delete it before merge."
            exit 1
          fi
