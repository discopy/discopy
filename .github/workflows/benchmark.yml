name: benchmark

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    # Only run on main / manual dispatch, or on pull requests tagged "benchmark".
    if: >-
      github.event_name != 'pull_request'
      || contains(github.event.pull_request.labels.*.name, 'benchmark')
    runs-on: ubuntu-latest
    timeout-minutes: 15   # backstop: BENCH_FLAGS=bench:full has no in-process cap (~3-4 min observed)
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run:
        uv sync --locked --group dev
    - name: Name the artifact after the branch
      if: always()
      run: echo "slug=${REF//\//-}" >> "$GITHUB_OUTPUT"
      id: branch
      env:
        REF: ${{ github.head_ref || github.ref_name }}
    - name: Run composition benchmark
      # PRs run the small/medium sizes as a smoke; main / manual dispatch run the
      # full size tail (BENCH_FLAGS=bench:full).
      run: |
        mkdir -p benchmark-results
        uv run pytest benchmark/ -v --benchmark-json=benchmark-results/bench.json
    - name: Render report (and gate on the committed baseline, if present)
      if: always()
      run:
        uv run python benchmark/report.py benchmark-results/bench.json
          --output benchmark-results
          --baseline benchmark/baseline.json
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ steps.branch.outputs.slug }}
        path: benchmark-results/
