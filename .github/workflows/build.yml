name: build

on:
  push:
    branches:
      - 'main'
  pull_request:

env:
  SRC_DIR: discopy
  TEST_DIR: test
  DOCS_DIR: docs

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install Python ${{ matrix.python-version }}
      run:
        uv python install ${{ matrix.python-version }}
    - name: Check lockfile
      run:
        uv lock --check
    - name: Install
      run:
        uv sync --locked --python ${{ matrix.python-version }} --group dev
    - name: Check for errors
      run:
        uv run pflake8 ${{ env.SRC_DIR }}
    - name: Pylint
      run:
        uv run pylint ${{ env.SRC_DIR }}
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install Python ${{ matrix.python-version }}
      run:
        uv python install ${{ matrix.python-version }}
    - name: Check lockfile
      run:
        uv lock --check
    - name: Build package
      run:
        uv build --python ${{ matrix.python-version }}
    - name: Upload distributions
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/*
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install Python ${{ matrix.python-version }}
      run:
        uv python install ${{ matrix.python-version }}
    - name: Check lockfile
      run:
        uv lock --check
    - name: Install
      run:
        uv sync --locked --python ${{ matrix.python-version }} --group dev --group test
    - name: Test
      run:
        uv run coverage run -m pytest
    - name: Coverage
      run:
        uv run coverage report --fail-under=98 --show-missing
  docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install Python ${{ matrix.python-version }}
      run:
        uv python install ${{ matrix.python-version }}
    - name: Check lockfile
      run:
        uv lock --check
    - name: Cache
      id: cache
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.DOCS_DIR }}/_api
          ${{ env.DOCS_DIR }}/_build
        key: ${{ runner.os }}-docs-${{ hashFiles('discopy/**', 'docs/**') }}  # TODO: refactor to use env.SRC_DIR and DOCS_DIR
        restore-keys: |
          ${{ runner.os }}-docs
    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc
        uv sync --locked --python ${{ matrix.python-version }} --group docs
    - name: Build
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        uv run sphinx-build ${{ env.DOCS_DIR }} ${{ env.DOCS_DIR }}/_build/html
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: ${{ env.DOCS_DIR }}/_build/html # or path/to/artifact
