name: build

on:
  push:
    branches:
      - 'main'
      - 'tooling/uv-migration'
  pull_request:

# Cancel superseded runs so a new push (including the docs/_static
# regeneration commit) supersedes the previous pipeline instead of running
# both to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SRC_DIR: discopy
  TEST_DIR: test
  DOCS_DIR: docs

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install linter
      run:
        uv sync --locked --group dev
    - name: Check for errors
      run:
        # stop the build if there are Python syntax errors or undefined names
        uv run pflake8 discopy
    - name: pylint
      run:
        uv run pylint discopy
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Graphviz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz
    - name: Install
      run:
        uv sync --locked --group dev --group all
    - name: Test
      run:
        uv run coverage run -m pytest
    - name: Coverage
      run:
        uv run coverage report --show-missing
    # Running the tests redraws every docs/_static image (from the module
    # doctests and any other image-generating test); upload them so the
    # docs-static job can commit them without rerunning the suite.
    - name: Upload docs/_static
      if: matrix.python-version == '3.14'
      uses: actions/upload-artifact@v4
      with:
        name: docs-static
        path: ${{ env.DOCS_DIR }}/_static
  docs-static:
    # Reuse the images generated by the test job and, whenever one actually
    # changed, commit them back onto the pull request so authors don't have to
    # regenerate docs/_static by hand.
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Generate a bot token
      id: app-token
      # A commit pushed with the default GITHUB_TOKEN starts no workflow run,
      # which would leave the regenerated head commit without the required
      # checks and block the merge. Push with a GitHub App token so the commit
      # is validated. Falls back to GITHUB_TOKEN when the App is not configured.
      if: vars.DOCS_BOT_APP_ID != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ vars.DOCS_BOT_APP_ID }}
        private-key: ${{ secrets.DOCS_BOT_PRIVATE_KEY }}
    - uses: actions/checkout@v4
      with:
        token: ${{ steps.app-token.outputs.token || github.token }}
        ref: ${{ github.head_ref }}
        fetch-depth: 0
    - name: Skip if the head commit is already a regeneration
      id: guard
      run: |
        if git log -1 --pretty=%s | grep -q '^Regenerate docs/_static'; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Download the regenerated docs/_static
      if: steps.guard.outputs.skip != 'true'
      uses: actions/download-artifact@v4
      with:
        name: docs-static
        path: ${{ env.DOCS_DIR }}/_static
    - name: Commit and push
      if: steps.guard.outputs.skip != 'true'
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add ${{ env.DOCS_DIR }}/_static
        if git diff --cached --quiet; then
          echo "No changes to docs/_static."
        else
          git commit -m "Regenerate docs/_static"
          git push origin HEAD:${{ github.head_ref }}
        fi
  docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache
      id: cache
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.DOCS_DIR }}/_api
          ${{ env.DOCS_DIR }}/_build
        key: ${{ runner.os }}-docs-${{ hashFiles('discopy/**', 'docs/**') }}
        restore-keys: |
          ${{ runner.os }}-docs
    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz pandoc
        uv sync --locked --group docs
    - name: Build
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        uv run sphinx-build ${{ env.DOCS_DIR }} ${{ env.DOCS_DIR }}/_build/html
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: ${{ env.DOCS_DIR }}/_build/html
