name: build

on:
  push:
    branches:
      - 'main'
      - 'tooling/uv-migration'
  pull_request:

env:
  SRC_DIR: discopy
  TEST_DIR: test
  DOCS_DIR: docs

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install linter
      run:
        uv sync --locked --group dev
    - name: Check for errors
      run:
        # stop the build if there are Python syntax errors or undefined names
        uv run pflake8 discopy
    - name: pylint
      run:
        uv run pylint discopy
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Graphviz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz
    - name: Install
      run:
        uv sync --locked --group dev --group all
    - name: Test
      run:
        uv run coverage run -m pytest
    - name: Coverage
      run:
        uv run coverage report --fail-under=98 --show-missing
  docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache
      id: cache
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.DOCS_DIR }}/_api
          ${{ env.DOCS_DIR }}/_build
        key: ${{ runner.os }}-docs-${{ hashFiles('discopy/**', 'docs/**') }}  # TODO: refactor to use env.SRC_DIR and DOCS_DIR
        restore-keys: |
          ${{ runner.os }}-docs
    - name: Install
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz pandoc
        uv sync --locked --group docs
    - name: Build
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        uv run sphinx-build ${{ env.DOCS_DIR }} ${{ env.DOCS_DIR }}/_build/html
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: ${{ env.DOCS_DIR }}/_build/html
