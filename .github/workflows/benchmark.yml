name: benchmark

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # backstop: PRs run the small/medium sizes in-runner (~15m, see #385);
    # main/dispatch hand the full sweep to Modal (see modal_app.py) and this
    # job just waits on it, so the cap only needs to clear Modal's own
    # function timeout (30m) plus setup.
    timeout-minutes: 40
    strategy:
      matrix:
        python-version: [ "3.14" ]
    steps:
    - uses: actions/checkout@v4
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run:
        uv sync --locked --group dev
    - name: Name the artifact after the branch
      if: always()
      run: echo "slug=${REF//\//-}" >> "$GITHUB_OUTPUT"
      id: branch
      env:
        REF: ${{ github.head_ref || github.ref_name }}
    - name: Run composition benchmark
      # PRs run the small/medium sizes as a smoke, in-runner (fast, free). main
      # / manual dispatch run the full size tail on a dedicated Modal
      # container instead of this runner -- it's ~7-8x slower than Modal/dev
      # hardware for this suite and can't fit the full sweep under a sane
      # timeout (see #346/#385/modal_app.py).
      env:
        MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      run: |
        mkdir -p benchmark-results
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          uv run pytest benchmark/ -v --ignore=benchmark/modal_app.py --benchmark-json=benchmark-results/bench.json
        else
          uv run --with modal==1.5.1 modal run benchmark/modal_app.py \
            --bench-flags bench:full \
            --output benchmark-results/bench.json
        fi
    - name: Render report (and gate on the committed baseline, if present)
      if: always()
      run:
        uv run python benchmark/report.py benchmark-results/bench.json
          --output benchmark-results
          --baseline benchmark/baseline.json
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ steps.branch.outputs.slug }}
        path: benchmark-results/
